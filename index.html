<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>expense tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#dc2626',      
            primarydark: '#b91c1c',  
          }
        }
      }
    }                                                                                                                                      
  </script>
<link rel="stylesheet" href="styles.css">
</head>
<body class="antialiased">

  <div class="max-w-4xl mx-auto px-4 py-10 sm:px-6 lg:px-8">

    <header class="text-center mb-10">
      <h1 class="text-4xl font-bold text-gray-900 mb-2">Expense Tracker</h1>
      <p class="text-lg text-gray-600">Track your spending — stay in control</p>
    </header>dew

    <!-- Form -->
    <div class="bg-white shadow-lg rounded-xl p-6 mb-8">
      <form id="expenseForm" class="grid grid-cols-1 sm:grid-cols-12 gap-4">
        <div class="sm:col-span-5">
          <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <input type="text" id="description" placeholder="e.g. Coffee" required
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary outline-none"/>
        </div>
        <div class="sm:col-span-3">
          <label for="amount" class="block text-sm font-medium text-gray-700 mb-1">Amount</label>
          <input type="number" id="amount" min="0.01" step="0.01" placeholder="0.00" required
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary outline-none"/>
        </div>
        <div class="sm:col-span-2">
          <label for="category" class="block text-sm font-medium text-gray-700 mb-1">Category</label>
          <select id="category" required
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary bg-white">
            <option value="" disabled selected>Choose</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Bills">Bills</option>
            <option value="Shopping">Shopping</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="sm:col-span-2 self-end">
          <button type="submit"
                  class="w-full bg-primary hover:bg-primarydark text-white font-medium py-2 px-4 rounded-lg transition shadow-sm">
            Add Expense
          </button>
        </div>
      </form>
    </div>

    <div id="message" class="hidden mb-6 px-4 py-3 rounded-lg text-center font-medium"></div>

    <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
      <div class="w-full sm:w-auto">
        <label for="filter" class="block text-sm font-medium text-gray-700 mb-1">Filter by category</label>
        <select id="filter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-primary focus:border-primary bg-white">
          <option value="all">All</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Bills">Bills</option>
          <option value="Shopping">Shopping</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="text-center sm:text-right">
        <p class="text-sm text-gray-600">Total Expenses</p>
        <p id="total" class="text-3xl font-bold text-gray-900">0.00 $</p>
      </div>
    </div>

    <div class="bg-white shadow-lg rounded-xl overflow-hidden">
      <ul id="expenseList" class="divide-y divide-gray-100 min-h-[200px]">
      </ul>
    </div>

  </div>

  <script src="script.js"></script>
    
</body>
</html>
